---
# This workflow is based on the template provided by Vite:
# https://vite.dev/guide/static-deploy#github-pages
name: Deploy Map to Github Pages (github.io)

on:
  # Runs on pushes or pull_requests targeting the default branch
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # This job runs for BOTH PRs and Merges to main
  # Sets up environment, does a build, runs the lint/format checks, then runs tests
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.15
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # Install UV and use it to install python dependencies
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          # Install a specific version of uv.
          version: "0.11.14"
      - name: Install Python Deps
        run: uv sync

      # Run the formatters and lints with continue on error so we have output from all of them
      # then check the results and fail if any have errors
      - name: JS Lint Checks (eslint)
        id: js-lint-check
        continue-on-error: true
        run: npm run lint
      - name: JS Format Checks (prettier)
        id: js-format-check
        continue-on-error: true
        run: npm run prettier-check
      - name: Python Lint Checks (flake8)
        id: py-lint-check
        continue-on-error: true
        run: npm run flake8
      - name: Python Format Checks (black)
        id: py-format-check
        continue-on-error: true
        run: npm run black-check

      # Check results of linters and formatters
      - name: Check Formatters and Linters
        if: |
          steps.js-lint-check.outcome != 'success' ||
          steps.js-format-check.outcome != 'success' ||
          steps.py-lint-check.outcome != 'success' ||
          steps.py-format-check.outcome != 'success'
        run: |
          echo Please fix all Linting or Format errors
          if [[ "${{steps.js-lint-check.outcome}}" != "success" ]]; then echo "Error: JS Linter Failed"; fi
          if [[ "${{steps.js-format-check.outcome}}" != "success" ]]; then echo "Error: JS Format Check Failed"; fi
          if [[ "${{steps.py-lint-check.outcome}}" != "success" ]]; then echo "Error: PY Linter Failed"; fi
          if [[ "${{steps.py-format-check.outcome}}" != "success" ]]; then echo "Error: PY Format Check Failed"; fi
          exit 1

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload dist/ for deployment
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist/


  # Deploy job that only runs when merging into main or for manual runs on forked repository
  # Allows deployment of dev branches to forked repository github pages from github.com or
  # Use: gh workflow run "deploy.yml" --ref "mydevbranch"
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    # Only run deploy for pushes to main or workflow_dispatch's to forked repositories
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' && github.repository != 'SupraGamesCommunity/maps'
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
